name: Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: false

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_pattern: 'apps/desktop/dist/release/*.dmg'
          - os: windows-latest
            artifact_pattern: 'apps/desktop/dist/release/*.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build desktop app
        run: pnpm --filter vnext-forge-desktop build

      - name: Package desktop app
        run: pnpm --filter vnext-forge-desktop package
        env:
          # Disable code signing for unsigned builds.
          # For signed production releases set CSC_LINK / CSC_KEY_PASSWORD (macOS)
          # or WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD (Windows) as repository secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-artifacts/**/*
