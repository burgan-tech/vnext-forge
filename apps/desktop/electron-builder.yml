appId: com.burgan-tech.vnext-forge-studio
productName: vnext-forge-studio
copyright: Copyright © 2025 Burgan Tech

directories:
  output: dist/release
  buildResources: build

files:
  - dist/main.js
  - dist/preload.js
  - dist/server.bundle.js
  - dist/vendor/**
  - dist/webview/**

asar: true
# These files must be real files on disk: the server bundle is executed as a
# utilityProcess, vendor/ is resolved by the server at runtime, webview/ is
# served as static files over HTTP, and preload.js must be a real path for
# BrowserWindow.webPreferences.preload.
asarUnpack:
  - dist/preload.js
  - dist/server.bundle.js
  - dist/vendor/**
  - dist/webview/**

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  icon: build/icons/icon.icns
  minimumSystemVersion: "12.0"

dmg:
  title: vnext-forge-studio ${version}
  artifactName: vnext-forge-studio-${version}-${arch}.dmg

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: vnext-forge-studio-Setup-${version}.exe

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  icon: build/icons/icon.png

publish: null
